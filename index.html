<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>DEUTSCHLAND - DAS MÄCHTIGE IMPERIUM</title>
    <style>
        body {
            margin: 0; padding: 0;
            font-family: 'Courier New', Courier, monospace;
            background-color: #050000; color: #ff0000;
            overflow: hidden;
        }

        section {
            min-height: 100vh; display: none; flex-direction: column;
            align-items: center; justify-content: center; text-align: center;
            padding: 20px; background-size: cover; background-position: center;
        }

        #pin-overlay {
            display: flex; position: fixed; top: 0; left: 0;
            width: 100%; height: 100%; background: black;
            z-index: 10000; justify-content: center; align-items: center;
            flex-direction: column;
        }

        h1 { font-size: 3rem; text-shadow: 0 0 20px #ff0000; margin-bottom: 30px; }

        .btn {
            padding: 20px 40px; background: #ff0000; color: #000;
            border: 3px solid #4a0000; font-weight: bold; font-size: 1.2rem;
            margin: 10px; cursor: pointer; text-transform: uppercase;
            box-shadow: 0 0 15px #ff0000; transition: 0.05s;
        }

        .btn:hover { filter: invert(1); transform: scale(1.05); }

        input[type="password"] {
            background: transparent; border: 2px solid #ff0000;
            color: #ff0000; padding: 15px; font-size: 2.5rem;
            text-align: center; width: 300px; outline: none;
        }

        #video-container {
            display: none; position: fixed; top: 0; left: 0;
            width: 100vw; height: 100vh; background: black; z-index: 9999;
        }

        video { width: 100%; height: 100%; object-fit: cover; }

        /* Other Game Styles */
        #game-container {
            display: none; position: fixed; top: 0; left: 0;
            width: 100%; height: 100%; background: #111; z-index: 500;
            flex-direction: column; align-items: center;
        }

        #physics-canvas {
            border: 5px solid #ff0000; background: #000;
            cursor: crosshair; margin-top: 20px;
        }

        .controls {
            background: rgba(255,0,0,0.2); padding: 15px;
            border-radius: 10px; margin-top: 10px; color: white;
        }

        .jumpscare-flash { animation: flash 0.15s infinite; }
        @keyframes flash { 0% { background: #f00; } 50% { background: #fff; } 100% { background: #000; } }
        
        #maze-msg { position: absolute; bottom: 20%; color: white; font-size: 2rem; width: 100%; text-align: center; pointer-events: none; }
    </style>
</head>
<body>

    <audio id="background-audio" src="erika.mp3" loop></audio>
    <audio id="final-audio" src="text.mp3"></audio>

    <div id="pin-overlay">
        <h1>STRENG GEHEIM</h1>
        <input type="password" id="pin-input" maxlength="4" oninput="checkPin()">
    </div>

    <section id="menu">
        <h1>DEUTSCHLAND EXAMEN</h1>
        <button class="btn" onclick="startQuiz()">QUIZ STARTEN</button>
        <button class="btn" onclick="playErika()">ERIKA</button>
        <button class="btn" onclick="openOther()">OTHER</button>
    </section>

    <section id="sub-menu">
        <h1>WOHIN JETZT?</h1>
        <button class="btn" onclick="playErika()">88</button>
        <button class="btn" onclick="playTeufel()">666</button>
        <button class="btn" onclick="playErika()">ICH WILL NICHT MEHR</button>
    </section>

    <!-- Physik Spiel Sektion -->
    <div id="game-container">
        <h2 style="color:red">BALL SPAWNER</h2>
        <canvas id="physics-canvas"></canvas>
        <div class="controls">
            Größe: <input type="range" id="ballSize" min="5" max="50" value="20">
            Hüpfen: <input type="checkbox" id="gravityToggle" checked>
            <button class="btn" style="padding:5px 10px; font-size: 0.8rem;" onclick="location.reload()">ZURÜCK</button>
        </div>
        <p>Klicke ins Feld um Bälle zu spawnen!</p>
    </div>

    <section id="quiz-container"></section>

    <div id="video-container">
        <video id="main-video" loop></video>
        <div id="maze-msg"></div>
        <button class="btn" id="escape-btn" style="position: absolute; top: 10px; right: 10px; opacity: 0.2;" onclick="tryEscape()">X</button>
    </div>

    <script>
        const questions = [
            { q: "Wer war der erste Reichskanzler des Deutschen Reiches 1871?", a: ["Otto von Bismarck", "Leo von Caprivi", "Friedrich III."], img: "https://asset.museum-digital.org/san/images/128/49284-ge_000039/anonym_portraet_otto_von_/anonym-portraet-otto-von-bismarck-49284.jpg" },
            { q: "Wie hieß die Verfassung der ersten deutschen Republik?", a: ["Weimarer Verfassung", "Paulskirchenverfassung", "Bonner Grundgesetz"], img: "https://www.dhm.de/fileadmin/medien/lemo/Titelbilder/f71-360.jpg" },
            { q: "Welcher Fluss ist mit 865km der längste, der vollständig in Deutschland fließt?", a: ["Weser", "Main", "Elbe"], img: "https://img.fotocommunity.com/die-weser-488a92d1-2d93-4996-9a2b-44958edd457b.jpg?height=1080" },
            { q: "In welcher Stadt wurde 1848 die erste deutsche Nationalversammlung eröffnet?", a: ["Frankfurt a.M.", "Berlin", "Leipzig"], img: "https://th.bing.com/th/id/R.c9be3430594065c41682b05393c11989?rik=pao0ioYAQ2q9Qw&pid=ImgRaw&r=0" },
            { q: "Wie viele Bundesländer hat Deutschland?", a: ["16", "15", "17"], img: "https://th.bing.com/th/id/OIP.ZTKn8-i08Mf1AfL1sH9lDwHaJx?w=198&h=262&c=7&r=0&o=7&pid=1.7&rm=3" },
            { q: "Wer schrieb die Melodie der deutschen Nationalhymne?", a: ["Joseph Haydn", "Ludwig van Beethoven", "Richard Wagner"], img: "https://tse1.mm.bing.net/th/id/OIP.J6WoJKNR5hMOQsZNJ2-1UAHaHa?r=0&rs=1&pid=ImgDetMain&o=7&rm=3" },
            { q: "Welches Ereignis fand am 9. November 1989 statt?", a: ["Mauerfall", "Wiedervereinigung", "Ende des WWII"], img: "https://wallpapers.com/images/hd/berlin-wall-at-potsdamer-platz-in-1989-gt2qfoogeh58ao20.jpg" },
            { q: "Wie heißt der höchste Berg Deutschlands?", a: ["Zugspitze", "Watzmann", "Feldberg"], img: "https://upload.wikimedia.org/wikipedia/commons/1/1a/Zugspitze_vom_Eibsee_aus.JPG" },
            { q: "Welcher Philosoph schrieb 'Also sprach Zarathustra'?", a: ["Friedrich Nietzsche", "Immanuel Kant", "Georg Hegel"], img: "https://upload.wikimedia.org/wikipedia/commons/1/1b/Nietzsche1882.jpg" },
            { q: "Wann wurde das Grundgesetz unterzeichnet?", a: ["23. Mai 1949", "17. Juni 1953", "3. Oktober 1990"], img: "https://upload.wikimedia.org/wikipedia/commons/e/e0/Grundgesetz_Original.jpg" },
            { q: "Wer war der erste Bundespräsident?", a: ["Theodor Heuss", "Konrad Adenauer", "Ludwig Erhard"], img: "https://upload.wikimedia.org/wikipedia/commons/5/52/Theodor_Heuss_1953.jpg" },
            { q: "In welchem Jahr wurde die D-Mark eingeführt?", a: ["1948", "1950", "1945"], img: "https://upload.wikimedia.org/wikipedia/commons/0/0a/5_DM_Serie1.jpg" },
            { q: "Wie hieß das Bündnis der norddeutschen Kaufleute im Mittelalter?", a: ["Hanse", "Gilde", "Zunft"], img: "https://upload.wikimedia.org/wikipedia/commons/3/3b/Hanseschiffe.jpg" },
            { q: "Welche Stadt ist die flächengrößte Deutschlands?", a: ["Berlin", "Hamburg", "München"], img: "https://upload.wikimedia.org/wikipedia/commons/0/0b/Berlin_Skyline_Fernsehturm.jpg" },
            { q: "Wer entdeckte die Röntgenstrahlen?", a: ["Wilhelm Conrad Röntgen", "Max Planck", "Albert Einstein"], img: "https://upload.wikimedia.org/wikipedia/commons/a/a2/Wilhelm_Conrad_R%C3%B6ntgen.jpg" },
            { q: "Welche Dynastie stellte die meisten Kaiser des Heiligen Römischen Reiches?", a: ["Habsburger", "Hohenzollern", "Staufer"], img: "https://upload.wikimedia.org/wikipedia/commons/0/0a/Imperial_Crown_of_the_Holy_Roman_Empire.jpg" },
            { q: "Wie nannte man die Gebiete der DDR nach 1990?", a: ["Neue Bundesländer", "Sowjetzone", "Ostgebiete"], img: "https://upload.wikimedia.org/wikipedia/commons/2/25/DDR_Map.svg" },
            { q: "Wer erfand den Buchdruck mit beweglichen Lettern?", a: ["Johannes Gutenberg", "Martin Luther", "Albrecht Dürer"], img: "https://upload.wikimedia.org/wikipedia/commons/3/33/Gutenberg.jpg" },
            { q: "Wofür steht die Abkürzung 'Stasi'?", a: ["Staatssicherheit", "Stadtsicherung", "Stabile Sicherheit"], img: "https://upload.wikimedia.org/wikipedia/commons/e/e0/MfS-Logo.svg" },
            { q: "Welche deutsche Insel liegt am weitesten im Norden?", a: ["Sylt", "Rügen", "Föhr"], img: "https://upload.wikimedia.org/wikipedia/commons/5/52/Sylt_Luftaufnahme.jpg" },
            { q: "Was war das 'Wunder von Bern'?", a: ["WM Titel 1954", "Mauerbau", "Wirtschaftswunder"], img: "https://upload.wikimedia.org/wikipedia/commons/c/ca/Fritz_Walter_1954.jpg" },
            { q: "Wer war die erste Frau im Amt des Bundeskanzlers?", a: ["Angela Merkel", "Annalena Baerbock", "Ursula von der Leyen"], img: "https://upload.wikimedia.org/wikipedia/commons/3/3b/Angela_Merkel_2019.jpg" },
            { q: "Welches Gesetz schuf 1834 einen einheitlichen deutschen Binnenmarkt?", a: ["Zollverein", "Handelsgesetz", "Reichsmarkt"], img: "https://upload.wikimedia.org/wikipedia/commons/c/c5/Zollverein_Karte.jpg" },
            { q: "Wie hieß der Widerstandskreis um Hans und Sophie Scholl?", a: ["Weiße Rose", "Rote Kapelle", "Edelweißpiraten"], img: "https://upload.wikimedia.org/wikipedia/commons/d/da/Sophie_Scholl.jpg" },
            { q: "In welcher Stadt steht der größte Dom Deutschlands?", a: ["Köln", "Ulm", "Speyer"], img: "https://upload.wikimedia.org/wikipedia/commons/a/a2/Koelner_Dom.jpg" },
            { q: "Wann begann der Dreißigjährige Krieg?", a: ["1618", "1648", "1517"], img: "https://upload.wikimedia.org/wikipedia/commons/e/ef/Battle_of_White_Mountain.jpg" },
            { q: "Wer komponierte 'Die Zauberflöte'?", a: ["W.A. Mozart", "J.S. Bach", "Johannes Brahms"], img: "https://upload.wikimedia.org/wikipedia/commons/1/1e/Wolfgang-amadeus-mozart_1.jpg" },
            { q: "Wie heißt die kleinste Landeshauptstadt Deutschlands?", a: ["Schwerin", "Saarbrücken", "Bremen"], img: "https://upload.wikimedia.org/wikipedia/commons/e/e6/Schweriner_Schloss.jpg" },
            { q: "Welche Farbe hat das Band der Bundesverdienstmedaille?", a: ["Rot", "Blau", "Gold"], img: "https://upload.wikimedia.org/wikipedia/commons/f/f6/Bundesverdienstkreuz_1.Klasse.JPG" },
            { q: "Wer war der 'Alte Fritz'?", a: ["Friedrich II. (Preußen)", "Friedrich I. (Barbarossa)", "Friedrich Wilhelm I."], img: "https://upload.wikimedia.org/wikipedia/commons/9/90/Friedrich_Zweite_Alt.jpg" }
        ];

        let currentIdx = 0;
        let escapeClicks = 0;
        let targetClicks = 15;
        let mode = "erika";

        function checkPin() {
            if (document.getElementById('pin-input').value === "1933") {
                document.getElementById('pin-overlay').style.display = 'none';
                document.getElementById('menu').style.display = 'flex';
            }
        }

        function startQuiz() {
            document.getElementById('menu').style.display = 'none';
            showQuestion();
        }

        function showQuestion() {
            const container = document.getElementById('quiz-container');
            const data = questions[currentIdx];
            container.style.display = 'flex';
            container.style.backgroundImage = `linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.85)), url('${data.img}')`;
            let answers = [...data.a].sort(() => Math.random() - 0.5);
            container.innerHTML = `<h2 style="color:#4a0000">STUFE ${currentIdx + 1} / 30</h2><h1>${data.q}</h1><div>${answers.map(ans => `<button class="btn" onclick="check('${ans}', '${data.a[0]}')">${ans}</button>`).join('')}</div>`;
        }

        function check(sel, cor) {
            if (sel === cor) {
                currentIdx++;
                document.body.classList.add('jumpscare-flash');
                setTimeout(() => {
                    document.body.classList.remove('jumpscare-flash');
                    if(currentIdx < questions.length) showQuestion(); 
                    else {
                        document.body.innerHTML = "<h1 style='text-align:center; margin-top:20%; color: gold;'>DU HAST ÜBERLEBT.</h1>";
                        document.getElementById('final-audio').play();
                    }
                }, 200);
            } else {
                document.body.classList.add('jumpscare-flash');
                setTimeout(() => { alert("VERSAGT!"); location.reload(); }, 300);
            }
        }

        function playErika() {
            mode = "erika"; targetClicks = 15;
            document.getElementById('background-audio').pause();
            const container = document.getElementById('video-container');
            const vid = document.getElementById('main-video');
            vid.src = "erika.mp4";
            container.style.display = 'block'; vid.play();
            if (container.requestFullscreen) container.requestFullscreen();
        }

        function playTeufel() {
            mode = "teufel"; targetClicks = 45;
            const container = document.getElementById('video-container');
            const vid = document.getElementById('main-video');
            vid.src = "teufel.mp4";
            container.style.display = 'block'; vid.play();
        }

        function tryEscape() {
            escapeClicks++;
            const btn = document.getElementById('escape-btn');
            btn.style.top = Math.random() * 80 + "%";
            btn.style.left = Math.random() * 80 + "%";
            document.getElementById('maze-msg').innerText = "TREFFER: " + escapeClicks + " / " + targetClicks;
            if(escapeClicks >= targetClicks) {
                document.getElementById('video-container').style.display = 'none';
                document.getElementById('main-video').pause();
                if(mode === "erika") {
                    document.getElementById('menu').style.display = 'none';
                    document.getElementById('sub-menu').style.display = 'flex';
                    document.getElementById('background-audio').play();
                } else location.reload();
            }
        }

        // --- PHYSICS GAME LOGIC ---
        const canvas = document.getElementById('physics-canvas');
        const ctx = canvas.getContext('2d');
        let balls = [];

        function openOther() {
            document.getElementById('menu').style.display = 'none';
            document.getElementById('game-container').style.display = 'flex';
            canvas.width = 600; canvas.height = 400;
            animate();
        }

        canvas.addEventListener('mousedown', (e) => {
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            const size = parseInt(document.getElementById('ballSize').value);
            balls.push({
                x, y, radius: size, 
                vx: (Math.random() - 0.5) * 10, 
                vy: (Math.random() - 0.5) * 10,
                color: `hsl(${Math.random() * 360}, 70%, 50%)`
            });
        });

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const gravity = document.getElementById('gravityToggle').checked ? 0.25 : 0;

            balls.forEach((b, i) => {
                b.vy += gravity;
                b.x += b.vx; b.y += b.vy;

                // Wall bounce
                if (b.x + b.radius > canvas.width || b.x - b.radius < 0) b.vx *= -0.8;
                if (b.y + b.radius > canvas.height) {
                    b.y = canvas.height - b.radius;
                    b.vy *= -0.7;
                }
                if (b.y - b.radius < 0) b.vy *= -0.8;

                // Ball collision
                for (let j = i + 1; j < balls.length; j++) {
                    let b2 = balls[j];
                    let dx = b2.x - b.x; let dy = b2.y - b.y;
                    let dist = Math.sqrt(dx*dx + dy*dy);
                    if (dist < b.radius + b2.radius) {
                        // Simple bounce
                        [b.vx, b2.vx] = [b2.vx, b.vx];
                        [b.vy, b2.vy] = [b2.vy, b.vy];
                    }
                }

                ctx.beginPath();
                ctx.arc(b.x, b.y, b.radius, 0, Math.PI * 2);
                ctx.fillStyle = b.color;
                ctx.fill();
                ctx.closePath();
            });
            requestAnimationFrame(animate);
        }
    </script>
</body>
</html>
